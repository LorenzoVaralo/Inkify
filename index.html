<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#f5f5f0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="description" content="Inkify - A minimalist Spotify remote control with an e-ink aesthetic">
    <title>Inkify</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎵</text></svg>">
</head>
<body>
    <div class="container">
        <!-- Login Screen -->
        <div id="login-screen" class="screen">
            <div class="logo">
                <h1>inkify</h1>
                <p class="tagline">Your music, simplified.</p>
            </div>
            <button id="login-btn" class="btn btn-primary">
                Connect to Spotify
            </button>
        </div>

        <!-- Now Playing Screen -->
        <div id="player-screen" class="screen hidden">
            <div class="header">
                <h2>Now Playing</h2>
                <div class="header-actions">
                    <button id="fullscreen-btn" class="btn btn-icon" title="Toggle fullscreen">
                        <svg id="expand-icon" viewBox="0 0 24 24" width="18" height="18">
                            <path fill="currentColor" d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
                        </svg>
                        <svg id="compress-icon" viewBox="0 0 24 24" width="18" height="18" class="hidden">
                            <path fill="currentColor" d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/>
                        </svg>
                    </button>
                    <button id="theme-btn" class="btn btn-icon" title="Toggle dark mode">
                        <svg id="moon-icon" viewBox="0 0 24 24" width="18" height="18">
                            <path fill="currentColor" d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/>
                        </svg>
                        <svg id="sun-icon" viewBox="0 0 24 24" width="18" height="18" class="hidden">
                            <path fill="currentColor" d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58a.996.996 0 0 0-1.41 0 .996.996 0 0 0 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37a.996.996 0 0 0-1.41 0 .996.996 0 0 0 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0a.996.996 0 0 0 0-1.41l-1.06-1.06zm1.06-10.96a.996.996 0 0 0 0-1.41.996.996 0 0 0-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.36a.996.996 0 0 0 0-1.41.996.996 0 0 0-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z"/>
                        </svg>
                    </button>
                    <button id="logout-btn" class="btn btn-small">Disconnect</button>
                </div>
            </div>

            <div class="player-content">
                <div class="album-art-container">
                    <img id="album-art" src="" alt="Album Art" class="album-art">
                    <div id="no-playback" class="no-playback hidden">
                        <p>No music playing</p>
                        <p class="hint">Play something on Spotify</p>
                    </div>
                </div>

                <div class="track-details">
                    <div class="track-info">
                        <h3 id="track-name" class="track-name">---</h3>
                        <p id="artist-name" class="artist-name">---</p>
                        <p id="album-name" class="album-name">---</p>
                    </div>

                    <div class="progress-container">
                        <span id="current-time" class="time">0:00</span>
                        <div class="progress-bar">
                            <div id="progress-fill" class="progress-fill"></div>
                        </div>
                        <span id="total-time" class="time">0:00</span>
                    </div>

                    <div class="controls">
                        <button id="prev-btn" class="btn btn-control" title="Previous">
                            <svg viewBox="0 0 24 24" width="24" height="24">
                                <path fill="currentColor" d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
                            </svg>
                        </button>
                        <button id="play-pause-btn" class="btn btn-control btn-play" title="Play/Pause">
                            <svg id="play-icon" viewBox="0 0 24 24" width="32" height="32">
                                <path fill="currentColor" d="M8 5v14l11-7z"/>
                            </svg>
                            <svg id="pause-icon" viewBox="0 0 24 24" width="32" height="32" class="hidden">
                                <path fill="currentColor" d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                            </svg>
                        </button>
                        <button id="next-btn" class="btn btn-control" title="Next">
                            <svg viewBox="0 0 24 24" width="24" height="24">
                                <path fill="currentColor" d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
                            </svg>
                        </button>
                    </div>

                    <div id="device-info" class="device-info">
                        <span id="device-name">---</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Error Display -->
        <div id="error-toast" class="error-toast hidden">
            <span id="error-message"></span>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
